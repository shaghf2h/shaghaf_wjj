<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>سارة ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0b0509;
    --bg-1:#1a0a12;
    --pink-1:#ff6f91;
    --pink-2:#ff2e63;
    --pink-3:#ffd1dc;
    --text:#fdf2f5;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 20%, rgba(255,46,99,0.18), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(255,111,145,0.12), transparent 50%),
      var(--bg-0);
    font-family:'Tajawal', sans-serif;
    color:var(--text);
    -webkit-tap-highlight-color: transparent;
  }
  .stage{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(1.2rem, 4vw, 2.2rem);
    padding: 6vw;
    text-align:center;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .55s ease;
  }
  .stage.active{ opacity:1; visibility:visible; pointer-events:auto; }

  .eyebrow{
    letter-spacing:.3em;
    font-size:.78rem;
    color:var(--pink-1);
    text-transform:uppercase;
    opacity:.85;
  }
  h1{
    margin:0;
    font-weight:900;
    font-size:clamp(1.9rem, 6vw, 3.4rem);
    line-height:1.25;
    text-shadow:0 0 30px rgba(255,46,99,.35);
  }
  .sub{
    margin:0;
    font-size:clamp(1rem, 2.6vw, 1.25rem);
    color:#f3c9d3;
    max-width:32rem;
  }

  button{
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:clamp(1rem, 2.6vw, 1.2rem);
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:.95em 2.4em;
    color:#fff;
    background:linear-gradient(135deg, var(--pink-2), var(--pink-1));
    box-shadow:0 10px 30px rgba(255,46,99,.35), inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .15s ease, box-shadow .15s ease, left .18s ease, top .18s ease;
  }
  button:hover{ transform:scale(1.06); }
  button:active{ transform:scale(.96); }

  .choice-row{
    display:flex; gap:1.2rem; align-items:center; justify-content:center;
    flex-wrap:wrap;
  }
  #btnYes{
    background:linear-gradient(135deg,#ff2e63,#ff7aa2);
  }
  #btnNo{
    background:linear-gradient(135deg,#5c5364,#3a3340);
    position:relative;
    z-index:5;
  }

  #stage3{ padding:0; }
  #heartCanvas{
    position:absolute; inset:0; width:100%; height:100%; display:block;
  }
  .heart-caption{
    position:relative; z-index:2;
    font-size:clamp(.85rem,2.4vw,1rem);
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--pink-3);
    opacity:0;
    animation: fadeIn 1.2s ease forwards;
    animation-delay: .4s;
    margin-top: 6vh;
  }
  .replay{
    position:absolute; bottom:5vh; left:50%; transform:translateX(-50%);
    z-index:3;
    font-size:.85rem;
    padding:.7em 1.6em;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,209,220,.35);
    opacity:0;
    animation: fadeIn 1.2s ease forwards;
    animation-delay: 2.2s;
  }
  .replay:hover{ background:rgba(255,255,255,.16); }

  @keyframes fadeIn{ to{ opacity:1; } }

  .floaty{
    position:absolute;
    font-size:1.4rem;
    opacity:.18;
    pointer-events:none;
    animation: rise linear infinite;
    z-index:1;
  }
  @keyframes rise{
    from{ transform:translateY(0) scale(1); }
    to{ transform:translateY(-110vh) scale(1.3); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    button, .stage{ transition:none; }
    .floaty{ animation:none; display:none; }
  }
</style>
</head>
<body>

  <!-- المرحلة ١: الترحيب -->
  <div id="stage1" class="stage active">
    <div class="eyebrow">رسالة خاصة</div>
    <h1>هلو سارة 👋</h1>
    <button id="btnHello">هلوو</button>
  </div>

  <!-- المرحلة ٢: السؤال -->
  <div id="stage2" class="stage">
    <h1>سارة، علي كَلِش يحبج…<br>تحبين علي؟ 🥺</h1>
    <p class="sub">جاوبي بصراحة 👀</p>
    <div class="choice-row">
      <button id="btnYes">اي ❤️</button>
      <button id="btnNo">لا</button>
    </div>
  </div>

  <!-- المرحلة ٣: القلب -->
  <div id="stage3" class="stage">
    <canvas id="heartCanvas"></canvas>
    <div class="heart-caption">سوسه قلبي  ❤️</div>
    <button class="replay" id="btnReplay">ابدأ من جديد 🔁</button>
  </div>

<script>
(function(){
  const stage1 = document.getElementById('stage1');
  const stage2 = document.getElementById('stage2');
  const stage3 = document.getElementById('stage3');
  const btnHello = document.getElementById('btnHello');
  const btnYes = document.getElementById('btnYes');
  const btnNo = document.getElementById('btnNo');
  const btnReplay = document.getElementById('btnReplay');

  function showStage(el){
    [stage1, stage2, stage3].forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  // ---------- المرحلة ١ -> ٢ ----------
  btnHello.addEventListener('click', () => showStage(stage2));

  // ---------- زر "لا" الهارب ----------
  const noTexts = ["لا","ليش؟! 😢","حاول مرة ثانية","مستحيل 😅","حرااام عليج","امسكيني إذا كدرتي","لا ولا","متأكدة... لا","يلا جاوبي صح 😏"];
  let noIndex = 0;
  let yesGrow = 1;

  function dodgeNo(e){
    if (e) e.preventDefault();
    const margin = 24;
    const bw = btnNo.offsetWidth, bh = btnNo.offsetHeight;
    const maxX = Math.max(margin, window.innerWidth - bw - margin);
    const maxY = Math.max(margin, window.innerHeight - bh - margin);
    const x = margin + Math.random() * (maxX - margin);
    const y = margin + Math.random() * (maxY - margin);
    btnNo.style.position = 'fixed';
    btnNo.style.left = x + 'px';
    btnNo.style.top = y + 'px';
    noIndex = (noIndex + 1) % noTexts.length;
    btnNo.textContent = noTexts[noIndex];

    yesGrow = Math.min(yesGrow + 0.06, 1.6);
    btnYes.style.transform = `scale(${yesGrow})`;
  }
  btnNo.addEventListener('mouseenter', dodgeNo);
  btnNo.addEventListener('touchstart', dodgeNo, {passive:false});
  btnNo.addEventListener('click', dodgeNo);

  // ---------- المرحلة ٢ -> ٣ ----------
  let heartStarted = false;
  btnYes.addEventListener('click', () => {
    showStage(stage3);
    if (!heartStarted){
      heartStarted = true;
      initHeart();
    } else {
      heartAnimating = true;
      requestAnimationFrame(drawHeart);
    }
    spawnFloaties();
  });

  // ---------- إعادة البداية ----------
  btnReplay.addEventListener('click', () => {
    btnNo.style.position = '';
    btnNo.style.left = '';
    btnNo.style.top = '';
    btnNo.textContent = 'لا';
    btnYes.style.transform = 'scale(1)';
    yesGrow = 1;
    noIndex = 0;
    showStage(stage1);
  });

  // ---------- حبيبات قلوب طايرة خفيفة ----------
  function spawnFloaties(){
    for (let i=0;i<10;i++){
      const f = document.createElement('div');
      f.className = 'floaty';
      f.textContent = '❤';
      f.style.left = Math.random()*100 + 'vw';
      f.style.bottom = '-5vh';
      f.style.animationDuration = (8 + Math.random()*10) + 's';
      f.style.animationDelay = (Math.random()*6) + 's';
      f.style.fontSize = (1 + Math.random()*1.4) + 'rem';
      stage3.appendChild(f);
    }
  }

  // ---------- رسم القلب بكلمات I LOVE YOU SARA ----------
  let heartAnimating = true;
  function initHeart(){
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    ctx.fillStyle = '#0b0509';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    function heartMath(t){
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
      return {x, y};
    }

    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    for(let t=0; t<Math.PI*2; t+=0.01){
      const p = heartMath(t);
      if(p.x<minX) minX=p.x; if(p.x>maxX) maxX=p.x;
      if(p.y<minY) minY=p.y; if(p.y>maxY) maxY=p.y;
    }
    const midX = (minX+maxX)/2, midY = (minY+maxY)/2;
    const span = Math.max(maxX-minX, maxY-minY);

    const phrase = "I LOVE YOU SARA   ";
    const duration = 4200;
    const layers = [
      { scaleMul:1.00, alpha:1.0,  speed:1.00, color:'#ff5c82', glow:'#ff2e63' },
      { scaleMul:0.92, alpha:0.5,  speed:0.85, color:'#ffb3c6', glow:'#ff6f91' },
      { scaleMul:1.08, alpha:0.3,  speed:1.2,  color:'#ffe3ea', glow:'#ffb3c6' }
    ];

    window.heartStartTime = null;

    window.drawHeart = function(ts){
      if(!heartAnimating) return;
      if(!window.heartStartTime) window.heartStartTime = ts;
      const elapsed = ts - window.heartStartTime;

      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(6,2,5,0.28)';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      const scaleBase = Math.min(canvas.width, canvas.height) * 0.78 / span;
      const cx = canvas.width/2;
      const cy = canvas.height/2 + Math.min(canvas.width, canvas.height)*0.02;

      layers.forEach(layer => {
        const scale = scaleBase * layer.scaleMul;
        const cycle = (elapsed * layer.speed / duration) % 1.3;
        const revealAngle = Math.min(cycle, 1) * Math.PI * 2;

        ctx.font = `800 ${Math.max(9, scale*0.78)}px Poppins, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = layer.glow;
        ctx.shadowBlur = 14;
        ctx.fillStyle = layer.color;
        ctx.globalAlpha = layer.alpha;

        const steps = 130;
        for(let i=0; i<=steps; i++){
          const t = (i/steps) * revealAngle;
          if (t > revealAngle) break;
          const p1 = heartMath(t);
          const p2 = heartMath(t + 0.01);
          const x1 = cx + (p1.x - midX) * scale;
          const y1 = cy - (p1.y - midY) * scale;
          const x2 = cx + (p2.x - midX) * scale;
          const y2 = cy - (p2.y - midY) * scale;
          const angle = Math.atan2(y2 - y1, x2 - x1);
          const ch = phrase[i % phrase.length];

          ctx.save();
          ctx.translate(x1, y1);
          ctx.rotate(angle);
          ctx.fillText(ch, 0, 0);
          ctx.restore();
        }
      });

      ctx.globalAlpha = 1;
      if (heartAnimating) requestAnimationFrame(window.drawHeart);
    };

    requestAnimationFrame(window.drawHeart);
  }
})();
</script>
</body>
</html>
